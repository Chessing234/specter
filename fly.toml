# Fly.io config for SPECTER API (requires billing on fly.io dashboard).
# Deploy: fly deploy --dockerfile Dockerfile.backend
# After attach postgres: fly secrets set ENVIRONMENT=production SECRET_KEY=$(openssl rand -hex 32)

app = 'specter-api'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile.backend'

[env]
  ENVIRONMENT = 'production'
  LOG_LEVEL = 'INFO'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
