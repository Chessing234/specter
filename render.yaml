# Render Blueprint — SPECTER API
# Apply: connect repo in Render Dashboard → New Blueprint → use this file
# Or validate: render blueprints validate ./render.yaml

services:
  - type: web
    name: specter-api
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        fromDatabase:
          name: specter-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false

databases:
  - name: specter-db
    plan: free
    postgresMajorVersion: "16"
    ipAllowList: []
